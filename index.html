.site {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 12px;
  border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.site-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-nav { display: flex; gap: 12px; }
.topbar-nav a {
  font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--muted); transition: color 0.15s;
}
.topbar-nav a:hover, .topbar-nav a.active { color: var(--text); }
.topbar-right { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.timestamp {
  font-size: 10px; color: var(--muted); letter-spacing: 0.04em;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}

/* POSTS */
.post { border-bottom: 1px solid var(--border); padding: 24px 0; }
.post-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 12px;
}

/* IMAGE */
.post-img { width: 100%; background: #e8e4df; }
.post-img img {
  width: 100%; height: auto; display: block;
  object-fit: cover;
}

/* SLIDESHOW */
.slideshow { position: relative; overflow: hidden; background: #e8e4df; }
.slideshow-track { display: flex; transition: transform 0.4s ease; }
.slideshow-track img { min-width: 100%; width: 100%; height: auto; display: block; object-fit: cover; }
.slide-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(245,242,238,0.75); border: none; width: 28px; height: 28px;
  cursor: pointer; font-size: 14px; display: flex; align-items: center;
  justify-content: center; color: #111; z-index: 2; transition: background 0.15s;
}
.slide-btn:hover { background: rgba(245,242,238,0.95); }
.slide-btn.prev { left: 6px; } .slide-btn.next { right: 6px; }
.slide-counter {
  position: absolute; bottom: 8px; right: 10px;
  font-size: 9px; letter-spacing: 0.08em; color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.25); padding: 2px 5px;
}

/* EMBEDS */
.post-embed { width: 100%; border: none; display: block; }

/* TEXT */
.post-text { font-size: 11px; line-height: 1.65; letter-spacing: 0.01em; margin-top: 10px; color: var(--muted); }

/* SHARE */
.post-share { display: flex; align-items: center; margin-top: 12px; }
.share-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-right: 10px; }
.share-icons { display: flex; gap: 10px; }
.share-icons a { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); transition: color 0.15s; }
.share-icons a:hover { color: var(--text); }

/* FOOTER */
footer { border-top: 1px solid var(--border); padding: 16px 0 24px; display: flex; gap: 20px; }
footer a { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); transition: color 0.15s; }
footer a:hover { color: var(--text); }

/* SUBSCRIBE BANNER */
.subscribe-banner {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: 10px 16px; z-index: 100;
}
.subscribe-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.subscribe-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
.subscribe-form { display: flex; gap: 8px; }
.subscribe-input {
  border: 1px solid var(--border); background: transparent; font-family: var(--font);
  font-size: 10px; padding: 5px 10px; outline: none; width: 160px;
}
.subscribe-input:focus { border-color: var(--text); }
.subscribe-btn {
  background: var(--text); color: var(--bg); border: none; font-family: var(--font);
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 12px; cursor: pointer; transition: opacity 0.15s;
}
.subscribe-btn:hover { opacity: 0.7; }

<script>
  // Live timestamp
  function tick() {
    const now = new Date();
    const d = (now.getMonth()+1) + '.' + now.getDate() + '.' + String(now.getFullYear()).slice(2);
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('ts').textContent = d + ' ' + h + ':' + m;
  }
  tick(); setInterval(tick, 1000);

  // Slideshow
  const idx = {};
  function slide(id, dir) {
    const track = document.getElementById('t-' + id);
    const counter = document.getElementById('c-' + id);
    const total = track.children.length;
    if (idx[id] === undefined) idx[id] = 0;
    idx[id] = (idx[id] + dir + total) % total;
    track.style.transform = 'translateX(-' + (idx[id] * 100) + '%)';
    counter.textContent = (idx[id]+1) + ' / ' + total;
  }
</script>
